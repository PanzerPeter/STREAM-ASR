# Streaming/offline single-pass RNN-T decoder settings. chunk_size is in BASE-rate (50 fps) frames
# and MUST be a multiple of ZipformerEncoder.chunk_lcm(); the handler feeds the encoder feature
# chunks of 2*chunk_size.
chunk_size: 16
beam_size: 10
# LM fusion. lm_weight (alpha) = 0.0 reproduces the pre-LM decoder exactly.
lm_weight: 0.0
lm_checkpoint: data/checkpoints/lm_best.pt
max_symbols: 5   # max non-blank emissions per encoder frame in transducer beam search
# Per-token re-ranking bonus (counters RNN-T's un-normalised deletion bias). 0.0 = off / regression
# lock. Swept jointly with lm_weight by evaluate.py --tune. Try ~[0.0, 1.0] if deletions dominate.
length_bonus: 0.0
