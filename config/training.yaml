transducer:
  max_frames_per_batch: 18000    # frame budget (base of the frame×token bucket)
  max_tokens_per_batch: 4000     # transcript-char budget: caps the RNN-T joiner lattice B*T*(U+1)
  grad_accum: 4
  warmup_steps: 10000
  total_steps: 120000
  weight_decay: 1.0e-2
  grad_clip: 5.0
  log_every: 50
  val_every: 2000
  ckpt_every: 2000
  grad_checkpoint: false
  seed: 42
  chunk_sizes: [0, 16, 32]       # 0 = full context; 16/32 = base-rate frames sampled per batch
  warm_start: data/checkpoints/bestrq_encoder.pt
  dev_wer_utts: 200              # #dev utterances for the periodic greedy-transducer WER probe
  spec_augment: true             # SpecAugment on the log-mel input during training (regularisation)
